<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 에임 훈련장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; user-select: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        /* 기본 크로스헤어 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: #00ffcc;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        .crosshair-fire { animation: fireAnim 0.1s ease-out; }
        @keyframes fireAnim {
            0% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        }

        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="text-white font-sans antialiased">

    <!-- 3D 캔버스 -->
    <canvas id="game-canvas"></canvas>

    <!-- 스나이퍼 정조준(스코프) 오버레이 -->
    <div id="scope-overlay" class="hidden absolute top-0 left-0 w-full h-full pointer-events-none flex items-center justify-center z-20">
        <!-- 블랙 비네팅 (가장자리 어둡게 처리) -->
        <div class="absolute w-full h-full" style="background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.98) 45%, black 100%);"></div>
        <!-- 십자선 가로/세로 -->
        <div class="absolute w-[2px] h-[100vh] bg-white opacity-90 shadow-[0_0_5px_rgba(255,255,255,0.8)]"></div>
        <div class="absolute w-[100vw] h-[2px] bg-white opacity-90 shadow-[0_0_5px_rgba(255,255,255,0.8)]"></div>
        <!-- 거리 측정 원형 및 중심점 -->
        <div class="absolute w-[300px] h-[300px] border-2 border-white rounded-full opacity-60 shadow-[0_0_5px_rgba(255,255,255,0.5)]"></div>
        <div class="absolute w-2 h-2 bg-red-500 rounded-full opacity-90 shadow-[0_0_5px_rgba(255,0,0,0.8)]"></div>
    </div>

    <!-- UI 레이어 -->
    <div id="ui-layer" class="flex items-center justify-center z-30">
        
        <!-- 메인 메뉴 -->
        <div id="menu-screen" class="interactive bg-gray-900 bg-opacity-90 p-8 rounded-xl shadow-2xl border border-gray-700 w-96 flex flex-col gap-6 text-center">
            <h1 class="text-3xl font-bold text-teal-400">3D 에임 훈련장</h1>
            
            <div class="flex flex-col gap-2 text-left">
                <label class="text-gray-300 font-semibold">난이도 선택</label>
                <div class="grid grid-cols-3 gap-2">
                    <button id="btn-easy" class="diff-btn py-2 bg-green-600 hover:bg-green-500 rounded font-bold transition">Easy</button>
                    <button id="btn-normal" class="diff-btn py-2 bg-yellow-600 hover:bg-yellow-500 rounded font-bold transition border-2 border-white">Normal</button>
                    <button id="btn-hard" class="diff-btn py-2 bg-red-600 hover:bg-red-500 rounded font-bold transition">Hard</button>
                </div>
                <p id="diff-desc" class="text-sm text-gray-400 mt-1">타겟 생성 시간: 1.5초</p>
            </div>

            <div class="flex flex-col gap-2 text-left">
                <label class="text-gray-300 font-semibold">마우스 감도</label>
                <div class="flex items-center gap-3">
                    <input type="range" id="sens-slider" min="0.001" max="5.000" step="0.001" value="1.000" class="w-full accent-teal-400">
                    <input type="number" id="sens-input" min="0.001" max="5.000" step="0.001" value="1.000" class="w-20 bg-gray-800 border border-gray-600 rounded px-2 py-1 text-center font-mono">
                </div>
            </div>

            <div class="flex justify-between items-center bg-gray-800 p-3 rounded border border-gray-700">
                <span class="text-gray-300">현재 무기:</span>
                <span id="equipped-weapon-display" class="font-bold text-teal-300">기본 기관총</span>
            </div>

            <div class="flex flex-col gap-3 mt-2">
                <button id="btn-start" class="w-full py-3 bg-teal-500 hover:bg-teal-400 text-gray-900 font-black text-xl rounded transition">게임 시작</button>
                <button id="btn-open-shop" class="w-full py-2 bg-indigo-600 hover:bg-indigo-500 font-bold rounded transition">상점 (보유 코인: <span id="menu-coins">0</span>)</button>
            </div>
            
            <p class="text-xs text-gray-500">조준: 우클릭 / 사격: 좌클릭 / 무기 변경: 1, 2, 3 또는 B 키</p>
        </div>

        <!-- 인게임 HUD -->
        <div id="hud-screen" class="hidden absolute top-0 left-0 w-full h-full p-6 flex flex-col justify-between">
            <div class="flex justify-between items-start text-2xl font-bold drop-shadow-md">
                <div class="flex flex-col gap-1">
                    <div>진행도: <span id="hud-progress" class="text-teal-400">0</span> / 20</div>
                    <div>정확도: <span id="hud-accuracy" class="text-yellow-400">100</span>%</div>
                </div>
                <div>명중: <span id="hud-score" class="text-green-400">0</span></div>
            </div>
            <div class="text-center text-gray-400 text-sm">중단하려면 [ESC] 키를 누르세요</div>
        </div>
        <div id="crosshair"></div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="hidden interactive bg-gray-900 bg-opacity-95 p-8 rounded-xl shadow-2xl border border-gray-700 w-96 flex flex-col gap-6 text-center">
            <h2 class="text-3xl font-black text-white">결과 보고서</h2>
            
            <div class="bg-gray-800 p-4 rounded-lg flex flex-col gap-2">
                <div class="flex justify-around items-center">
                    <div class="flex flex-col">
                        <div class="text-gray-400 text-sm">최종 명중</div>
                        <div class="text-4xl font-black text-teal-400"><span id="result-score">0</span><span class="text-lg text-gray-500">/20</span></div>
                    </div>
                    <div class="w-px h-12 bg-gray-600"></div>
                    <div class="flex flex-col">
                        <div class="text-gray-400 text-sm">정확도</div>
                        <div class="text-4xl font-black text-yellow-400"><span id="result-accuracy">0</span>%</div>
                    </div>
                </div>
            </div>

            <div>
                <div class="text-gray-400 mb-1">달성 티어</div>
                <div id="result-tier" class="text-4xl font-black drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">BRONZE</div>
            </div>

            <div class="text-lg text-yellow-400 font-bold">
                + <span id="result-reward">0</span> 코인 획득!
            </div>
            <p class="text-sm text-gray-400 -mt-3">무기를 변경하려면 B 키를 누르세요.</p>

            <button id="btn-back-menu" class="w-full py-3 bg-gray-600 hover:bg-gray-500 font-bold text-xl rounded transition mt-2">메뉴로 돌아가기</button>
        </div>

        <!-- 상점 화면 -->
        <div id="shop-screen" class="hidden interactive bg-gray-900 bg-opacity-95 p-8 rounded-xl shadow-2xl border border-gray-700 w-[500px] flex flex-col gap-4">
            <div class="flex justify-between items-center border-b border-gray-700 pb-4">
                <h2 class="text-3xl font-black text-indigo-400">무기 상점</h2>
                <div class="text-xl font-bold text-yellow-400">코인: <span id="shop-coins">0</span></div>
            </div>

            <div id="weapon-list" class="flex flex-col gap-3 max-h-80 overflow-y-auto pr-2">
                <!-- JS에서 채워짐 -->
            </div>

            <button id="btn-close-shop" class="w-full py-3 bg-gray-700 hover:bg-gray-600 font-bold rounded transition mt-4">닫기</button>
        </div>

        <!-- 무기 선택(B) 화면 -->
        <div id="loadout-screen" class="hidden interactive bg-gray-900 bg-opacity-95 p-8 rounded-xl shadow-2xl border border-gray-700 w-96 flex flex-col gap-4 text-center">
            <h2 class="text-3xl font-black text-green-400 border-b border-gray-700 pb-4">무기 선택</h2>
            <p class="text-gray-400 text-sm mb-2">사용할 무기 종류를 선택하세요.</p>
            <div class="flex flex-col gap-3">
                <button id="btn-weap-rifle" class="w-full py-3 bg-gray-700 hover:bg-gray-600 font-bold rounded transition border-2 border-teal-400">라이플 (연사)</button>
                <button id="btn-weap-sniper" class="w-full py-3 bg-gray-700 hover:bg-gray-600 font-bold rounded transition border-2 border-transparent">스나이퍼 (0.5초 대기)</button>
                <button id="btn-weap-revolver" class="w-full py-3 bg-gray-700 hover:bg-gray-600 font-bold rounded transition border-2 border-transparent">리볼버 (단발)</button>
            </div>
            <button id="btn-close-loadout" class="w-full py-3 bg-gray-800 hover:bg-gray-700 font-bold rounded transition mt-4">닫기 (이전 화면으로)</button>
        </div>
    </div>

    <script>
        // === 게임 상태 및 데이터 ===
        let gameState = 'menu'; 
        let stateBeforeLoadout = 'menu'; 
        
        let difficulty = 'normal';
        let difficultyTimes = { 'easy': 3000, 'normal': 1500, 'hard': 750 };
        
        let score = 0;
        let targetsSpawned = 0;
        let coins = 0;
        let sensitivity = 1.000;
        
        let totalShots = 0; 
        
        let isShooting = false;
        let lastShotTime = 0;
        let isAiming = false; 
        
        let activeTarget = null;
        let targetTimeout = null;
        
        const tracers = []; 
        const particles = []; 

        const weaponStats = {
            'rifle': { name: '라이플', fireRate: 100, auto: true, recoil: 0.1, adsFov: 45 },
            'sniper': { name: '스나이퍼', fireRate: 500, auto: false, recoil: 0.4, adsFov: 15 },
            'revolver': { name: '리볼버', fireRate: 450, auto: false, recoil: 0.6, adsFov: 60 } 
        };
        let currentWeaponType = 'rifle';

        const SKINS = [
            { id: 'r_basic', type: 'rifle', name: '기본 라이플', price: 0, owned: true, color: '#00ffcc', pattern: 'none' },
            { id: 'r_pink', type: 'rifle', name: '네온 핑크', price: 50, owned: false, color: '#ff00aa', pattern: 'stars', patternColor: '#cc0088' },
            { id: 'r_gold', type: 'rifle', name: '황금 라이플', price: 150, owned: false, color: '#ffaa00', pattern: 'checkers', patternColor: '#cc8800' },
            { id: 's_basic', type: 'sniper', name: '기본 스나이퍼', price: 0, owned: true, color: '#00ff00', pattern: 'none' },
            { id: 's_blue', type: 'sniper', name: '아틱 스나이퍼', price: 80, owned: false, color: '#00aaff', pattern: 'triangles', patternColor: '#ffffff' },
            { id: 's_void', type: 'sniper', name: '보이드 스나이퍼', price: 200, owned: false, color: '#8800ff', pattern: 'dots', patternColor: '#000000' },
            { id: 'v_basic', type: 'revolver', name: '기본 리볼버', price: 0, owned: true, color: '#cccccc', pattern: 'none' },
            { id: 'v_red', type: 'revolver', name: '크림슨 리볼버', price: 40, owned: false, color: '#ff3333', pattern: 'waves', patternColor: '#660000' },
            { id: 'v_dark', type: 'revolver', name: '옵시디언 리볼버', price: 120, owned: false, color: '#222222', pattern: 'camo', patternColor: '#444444' }
        ];

        let equippedSkins = {
            'rifle': SKINS[0],
            'sniper': SKINS[3],
            'revolver': SKINS[6]
        };

        // === UI 요소 참조 ===
        const uiLayer = document.getElementById('ui-layer');
        const menuScreen = document.getElementById('menu-screen');
        const hudScreen = document.getElementById('hud-screen');
        const resultScreen = document.getElementById('result-screen');
        const shopScreen = document.getElementById('shop-screen');
        const loadoutScreen = document.getElementById('loadout-screen');
        
        const crosshair = document.getElementById('crosshair');
        const scopeOverlay = document.getElementById('scope-overlay');
        const sensSlider = document.getElementById('sens-slider');
        const sensInput = document.getElementById('sens-input');
        
        const hudProgress = document.getElementById('hud-progress');
        const hudScore = document.getElementById('hud-score');
        const hudAccuracy = document.getElementById('hud-accuracy'); 
        
        const diffBtns = {
            'easy': document.getElementById('btn-easy'),
            'normal': document.getElementById('btn-normal'),
            'hard': document.getElementById('btn-hard')
        };
        const diffDesc = document.getElementById('diff-desc');
        
        // === Three.js 셋업 ===
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.rotation.order = 'YXZ'; 
        scene.add(camera);

        // === 총기 3D 모델 생성 ===
        const gunGroup = new THREE.Group();
        const gunRestPosition = new THREE.Vector3(0.4, -0.3, -0.9); 
        const gunAdsPosition = new THREE.Vector3(0, -0.1, -0.6); 
        const currentLerpPos = new THREE.Vector3().copy(gunRestPosition); 
        
        gunGroup.position.copy(gunRestPosition);
        gunGroup.scale.set(1.3, 1.3, 1.3); // 총의 크기를 전체적으로 1.3배 더 크게 키움

        // 재질(Materials) 정의
        const gunMaterial = new THREE.MeshPhongMaterial({ color: SKINS[0].color, shininess: 80 }); 
        const darkMaterial = new THREE.MeshPhongMaterial({ color: 0x222222, shininess: 30 }); 
        const greyMaterial = new THREE.MeshPhongMaterial({ color: 0x555555, shininess: 50 }); 
        const glassMaterial = new THREE.MeshPhongMaterial({ color: 0x00ffff, shininess: 100, transparent: true, opacity: 0.15, depthWrite: false }); 
        const scopeMaterial = darkMaterial.clone();
        scopeMaterial.side = THREE.DoubleSide;

        // 1. 상부 몸통
        const upperBodyGeom = new THREE.CylinderGeometry(0.045, 0.045, 0.7, 32);
        upperBodyGeom.rotateX(Math.PI / 2);
        const upperBody = new THREE.Mesh(upperBodyGeom, gunMaterial);
        gunGroup.add(upperBody);

        // 2. 하부 몸통
        const lowerBodyGeom = new THREE.BoxGeometry(0.06, 0.08, 0.4);
        const lowerBody = new THREE.Mesh(lowerBodyGeom, darkMaterial);
        lowerBody.position.set(0, -0.06, 0);
        gunGroup.add(lowerBody);

        // 3. 손잡이
        const gripGeom = new THREE.CylinderGeometry(0.025, 0.03, 0.22, 16);
        const grip = new THREE.Mesh(gripGeom, darkMaterial);
        grip.position.set(0, -0.18, 0.15);
        grip.rotation.x = Math.PI / 8;
        gunGroup.add(grip);

        // 4. 개머리판
        const stockGeom = new THREE.BoxGeometry(0.04, 0.12, 0.35);
        const stock = new THREE.Mesh(stockGeom, greyMaterial);
        stock.position.set(0, -0.05, 0.5);
        gunGroup.add(stock);

        const stockPadGeom = new THREE.CylinderGeometry(0.025, 0.025, 0.14, 16);
        stockPadGeom.rotateZ(Math.PI / 2);
        const stockPad = new THREE.Mesh(stockPadGeom, darkMaterial);
        stockPad.position.set(0, -0.05, 0.67);
        stockPad.rotation.x = Math.PI / 2;
        gunGroup.add(stockPad);

        // 5. 탄창
        const magGeom = new THREE.BoxGeometry(0.04, 0.2, 0.1);
        const mag = new THREE.Mesh(magGeom, darkMaterial);
        mag.position.set(0, -0.18, -0.1);
        mag.rotation.x = -Math.PI / 16;
        gunGroup.add(mag);

        // 6. 총열 덮개
        const shroudGeom = new THREE.CylinderGeometry(0.04, 0.04, 0.3, 32);
        shroudGeom.rotateX(Math.PI / 2);
        const shroud = new THREE.Mesh(shroudGeom, gunMaterial);
        shroud.position.set(0, 0, -0.4);
        gunGroup.add(shroud);

        // 7. 총열
        const barrelGeom = new THREE.CylinderGeometry(0.015, 0.015, 0.4, 16);
        barrelGeom.rotateX(Math.PI / 2);
        const gunBarrel = new THREE.Mesh(barrelGeom, greyMaterial);
        gunBarrel.position.set(0, 0, -0.7);
        gunGroup.add(gunBarrel);

        // 8. 조준경
        const scopeGeom = new THREE.CylinderGeometry(0.025, 0.025, 0.2, 32, 1, true);
        scopeGeom.rotateX(Math.PI / 2);
        const scope = new THREE.Mesh(scopeGeom, scopeMaterial);
        scope.position.set(0, 0.08, 0);
        gunGroup.add(scope);

        const lensGeom = new THREE.CylinderGeometry(0.024, 0.024, 0.19, 32);
        lensGeom.rotateX(Math.PI / 2);
        const lens = new THREE.Mesh(lensGeom, glassMaterial);
        lens.position.set(0, 0.08, 0);
        gunGroup.add(lens);

        // === 9. 디테일한 손(전술 반장갑) 모델 추가 ===
        
        // 장갑의 직물 패턴 생성 (캔버스 범프 맵 효과용)
        function createFabricTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222222';
            ctx.fillRect(0, 0, 64, 64);
            ctx.fillStyle = '#1a1a1a';
            for(let x=0; x<64; x+=4) {
                for(let y=0; y<64; y+=4) {
                    if((x/4 + y/4) % 2 === 0) ctx.fillRect(x, y, 4, 4);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(12, 12);
            return tex;
        }
        
        const fabricTex = createFabricTexture();
        const shirtMaterial = new THREE.MeshPhongMaterial({ color: 0x1f231f, shininess: 5 }); // 팔뚝(옷)
        const gloveMaterial = new THREE.MeshPhongMaterial({ color: 0x2b2b2b, bumpMap: fabricTex, bumpScale: 0.01, shininess: 5 }); // 장갑(직물 질감)
        const knuckleMaterial = new THREE.MeshPhongMaterial({ color: 0x050505, shininess: 90 }); // 딱딱한 플라스틱 너클
        const skinMaterial = new THREE.MeshPhongMaterial({ color: 0xcc8e69, shininess: 15 }); // 노출된 피부(살구색)

        // --- 오른손 (방아쇠/손잡이) ---
        const rightHandGroup = new THREE.Group();
        
        // 소매 (옷)
        const rSleeve = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.5, 16).rotateX(Math.PI/2), shirtMaterial);
        rSleeve.position.set(0.04, -0.35, 0.45);
        rSleeve.rotation.y = -Math.PI / 12;
        rightHandGroup.add(rSleeve);

        // 장갑 몸통 (손바닥/손등)
        const rPalm = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.09, 0.07), gloveMaterial);
        rPalm.position.set(0.025, -0.18, 0.22);
        rPalm.rotation.x = Math.PI / 8;
        rightHandGroup.add(rPalm);

        // 너클 가드 (보호대)
        const rKnuckle = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.03, 0.08), knuckleMaterial);
        rKnuckle.position.set(0.05, -0.13, 0.22);
        rKnuckle.rotation.x = Math.PI / 8;
        rightHandGroup.add(rKnuckle);

        // 손가락 3개 (손잡이를 감싸는 중지, 약지, 소지)
        for(let i=0; i<3; i++) {
            // 장갑 부분
            const fBase = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.015, 0.03), gloveMaterial);
            fBase.position.set(0.015, -0.15 - (i * 0.025), 0.16);
            fBase.rotation.x = Math.PI / 8;
            fBase.rotation.y = -Math.PI / 6;
            rightHandGroup.add(fBase);
            // 노출된 피부 (손가락 끝)
            const fTip = new THREE.Mesh(new THREE.BoxGeometry(0.013, 0.013, 0.03), skinMaterial);
            fTip.position.set(0.005, -0.15 - (i * 0.025), 0.13);
            fTip.rotation.x = Math.PI / 8;
            fTip.rotation.y = -Math.PI / 4;
            rightHandGroup.add(fTip);
        }

        // 검지 (방아쇠에 걸친 손가락)
        const indexGlove = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.015, 0.03), gloveMaterial);
        indexGlove.position.set(0.025, -0.10, 0.16);
        indexGlove.rotation.x = Math.PI / 16;
        rightHandGroup.add(indexGlove);
        const indexSkin = new THREE.Mesh(new THREE.BoxGeometry(0.013, 0.013, 0.04), skinMaterial);
        indexSkin.position.set(0.025, -0.09, 0.13);
        indexSkin.rotation.x = Math.PI / 16;
        rightHandGroup.add(indexSkin);

        // 엄지
        const thumbGlove = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.04, 0.02), gloveMaterial);
        thumbGlove.position.set(-0.01, -0.15, 0.19);
        thumbGlove.rotation.x = Math.PI / 4;
        thumbGlove.rotation.z = Math.PI / 6;
        rightHandGroup.add(thumbGlove);
        const thumbSkin = new THREE.Mesh(new THREE.BoxGeometry(0.018, 0.03, 0.018), skinMaterial);

        // 동적 텍스처(스킨 문양) 생성 함수
        function createPatternTexture(skin) {
            if (skin.pattern === 'none') return null;

            const canvasTex = document.createElement('canvas');
            canvasTex.width = 256; canvasTex.height = 256;
            const ctx = canvasTex.getContext('2d');

            ctx.fillStyle = skin.color;
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = skin.patternColor;
            
            if (skin.pattern === 'stripes') {
                for (let i = -256; i < 512; i += 40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + 256, 256);
                    ctx.lineTo(i + 256 + 20, 256); ctx.lineTo(i + 20, 0); ctx.fill();
                }
            } else if (skin.pattern === 'checkers') {
                for (let x = 0; x < 256; x += 32) {
                    for (let y = 0; y < 256; y += 32) {
                        if ((x / 32 + y / 32) % 2 === 0) ctx.fillRect(x, y, 32, 32);
                    }
                }
            } else if (skin.pattern === 'stars') {
                for (let i = 0; i < 25; i++) {
                    let cx = Math.random() * 256; let cy = Math.random() * 256;
                    let spikes = 5, outerRadius = 20, innerRadius = 10;
                    ctx.beginPath(); let rot = Math.PI / 2 * 3;
                    let x = cx, y = cy, step = Math.PI / spikes;
                    ctx.moveTo(cx, cy - outerRadius);
                    for (let j = 0; j < spikes; j++) {
                        x = cx + Math.cos(rot) * outerRadius; y = cy + Math.sin(rot) * outerRadius; ctx.lineTo(x, y); rot += step;
                        x = cx + Math.cos(rot) * innerRadius; y = cy + Math.sin(rot) * innerRadius; ctx.lineTo(x, y); rot += step;
                    }
                    ctx.lineTo(cx, cy - outerRadius); ctx.closePath(); ctx.fill();
                }
            } else if (skin.pattern === 'triangles') {
                for (let i = 0; i < 40; i++) {
                    ctx.beginPath(); let x = Math.random() * 256; let y = Math.random() * 256;
                    ctx.moveTo(x, y); ctx.lineTo(x + 40, y + 60); ctx.lineTo(x - 40, y + 60); ctx.closePath(); ctx.fill();
                }
            } else if (skin.pattern === 'waves') {
                ctx.lineWidth = 10; ctx.strokeStyle = skin.patternColor;
                for (let y = 15; y < 256; y += 40) {
                    ctx.beginPath(); ctx.moveTo(0, y);
                    for (let x = 0; x <= 256; x += 20) { ctx.lineTo(x, y + Math.sin(x * 0.05) * 15); }
                    ctx.stroke();
                }
            } else if (skin.pattern === 'camo') {
                for (let i = 0; i < 40; i++) {
                    ctx.beginPath(); let x = Math.random() * 256; let y = Math.random() * 256;
                    ctx.arc(x, y, 15 + Math.random() * 25, 0, Math.PI * 2); ctx.fill();
                }
            } else if (skin.pattern === 'dots') {
                for (let x = 15; x < 256; x += 30) {
                    for (let y = 15; y < 256; y += 30) {
                        ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
                    }
                }
            }
            const texture = new THREE.CanvasTexture(canvasTex);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping; texture.repeat.set(2, 2);
            return texture;
        }

        function spawnTarget() {
            if (gameState !== 'playing') return;

            if (targetsSpawned >= 20) {
                endGame();
                return;
            }

            if (activeTarget) {
                scene.remove(activeTarget);
                activeTarget = null;
            }

            const geometry = new THREE.SphereGeometry(1.2, 16, 16);
            const material = new THREE.MeshPhongMaterial({ color: 0xff3333, emissive: 0x550000, shininess: 100 });
            activeTarget = new THREE.Mesh(geometry, material);

            const rangeX = 12;
            const rangeY = 6;
            const randomX = (Math.random() - 0.5) * rangeX;
            const randomY = (Math.random() - 0.2) * rangeY; 
            
            activeTarget.position.set(randomX, randomY, -15);
            scene.add(activeTarget);

            targetsSpawned++;
            updateHUD();

            targetTimeout = setTimeout(() => {
                spawnTarget(); 
            }, difficultyTimes[difficulty]);
        }

        function shoot() {
            if (!activeTarget) return;

            totalShots++; 

            crosshair.classList.remove('crosshair-fire');
            void crosshair.offsetWidth; 
            crosshair.classList.add('crosshair-fire');

            let shootCoord = new THREE.Vector2(0, 0);

            if (currentWeaponType === 'sniper' && !isAiming) {
                currentRecoil = 1.5;
                shootCoord.x = (Math.random() - 0.5) * 0.8; 
                shootCoord.y = (Math.random() - 0.5) * 0.8; 
            } else {
                currentRecoil = weaponStats[currentWeaponType].recoil;
            }

            raycaster.setFromCamera(shootCoord, camera);
            const intersects = raycaster.intersectObject(activeTarget);

            let startPoint = new THREE.Vector3();
            if (isAiming && currentWeaponType === 'sniper') {
                startPoint.copy(camera.position);
                startPoint.y -= 0.1;
            } else {
                if (currentWeaponType === 'revolver') {
                    startPoint.set(0, 0.02, -0.6); // 리볼버는 총구가 짧으므로 발사 지점을 당김
                } else {
                    startPoint.set(0, 0.05, -1.0); 
                }
                gunGroup.localToWorld(startPoint);
            }

            let endPoint = new THREE.Vector3();

            if (intersects.length > 0) {
                endPoint.copy(intersects[0].point);
                createExplosion(activeTarget.position, 0xff3333);

                clearTimeout(targetTimeout);
                scene.remove(activeTarget);
                activeTarget = null;
                
                score++;
                updateHUD();
                spawnTarget();
            } else {
                raycaster.ray.at(50, endPoint);
                updateHUD(); 
            }

            createTracer(startPoint, endPoint, equippedSkins[currentWeaponType].color);
        }

        function createTracer(start, end, colorHex) {
            const distance = start.distanceTo(end);
            const geometry = new THREE.CylinderGeometry(0.015, 0.015, distance, 8);
            geometry.rotateX(Math.PI / 2); 
            
            const material = new THREE.MeshBasicMaterial({ 
                color: colorHex, 
                transparent: true, 
                opacity: 0.8,
                depthWrite: false,
                blending: THREE.AdditiveBlending 
            });
            
            const tracer = new THREE.Mesh(geometry, material);
            const midPoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
            
            tracer.position.copy(midPoint);
            tracer.lookAt(end); 
            
            scene.add(tracer);
            tracers.push({ mesh: tracer, life: 1.0 }); 
        }

        function createExplosion(position, colorHex) {
            const particleCount = 12; 
            const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3); 
            
            for (let i = 0; i < particleCount; i++) {
                const material = new THREE.MeshPhongMaterial({ 
                    color: colorHex, 
                    emissive: 0x550000, 
                    shininess: 100,
                    transparent: true,
                    opacity: 1.0
                });
                
                const particle = new THREE.Mesh(geometry, material);
                particle.position.copy(position);
                
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.6,
                    (Math.random() - 0.5) * 0.6,
                    (Math.random() - 0.5) * 0.6
                );
                
                scene.add(particle);
                particles.push({ mesh: particle, velocity: velocity, life: 1.0 });
            }
        }

        function getTierAndReward(s, acc) {

            if (s >= 15) return { name: 'GOLD', reward: calcReward, color: '#ffd700' };
            if (s >= 8)  return { name: 'SILVER', reward: calcReward, color: '#c0c0c0' };

        // === 게임 루프 ===
        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'playing' && isShooting) {
                let stats = weaponStats[currentWeaponType];
                if (stats.auto) {
                    let now = Date.now();
                    if (now - lastShotTime >= stats.fireRate) {
                        shoot();
                        lastShotTime = now;
                    }
                }
            }

            if (activeTarget) {
                const scale = 1 + Math.sin(Date.now() * 0.005) * 0.05;
                activeTarget.scale.set(scale, scale, scale);
            }

            for (let i = tracers.length - 1; i >= 0; i--) {
                let t = tracers[i];
                t.life -= 0.08; 
                t.mesh.material.opacity = t.life;
                if (t.life <= 0) {
                    scene.remove(t.mesh);
                    t.mesh.geometry.dispose();
                    t.mesh.material.dispose();
                    tracers.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.life -= 0.04; 
                
                p.mesh.position.add(p.velocity); 
                p.mesh.rotation.x += p.velocity.x; 
                p.mesh.rotation.y += p.velocity.y;
                p.mesh.material.opacity = p.life;
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                }
            }

            if (gameState === 'playing') {
                currentRecoil += (0 - currentRecoil) * 0.15;

                let targetPos = isAiming ? gunAdsPosition : gunRestPosition;
                let targetFov = isAiming ? weaponStats[currentWeaponType].adsFov : 75;
                
                currentLerpPos.lerp(targetPos, 0.2); 
                camera.fov += (targetFov - camera.fov) * 0.2; 
                camera.updateProjectionMatrix();

                const breathMult = isAiming ? 0.2 : 1.0; 
                const breathX = Math.cos(Date.now() * 0.001) * 0.005 * breathMult;
                const breathY = Math.sin(Date.now() * 0.002) * 0.01 * breathMult;

                gunGroup.position.set(
                    currentLerpPos.x + breathX,
                    currentLerpPos.y + breathY,
                    currentLerpPos.z + currentRecoil 
                );
                gunGroup.rotation.x = currentRecoil * 0.5;

                if (isAiming) {
                    crosshair.style.display = 'none'; 

                    if (currentWeaponType === 'sniper') {
                        scopeOverlay.classList.remove('hidden');
                        gunGroup.visible = false;
                    } else {
                        scopeOverlay.classList.add('hidden');
                        gunGroup.visible = true;
                        crosshair.style.display = 'block'; 
                    }
                } else {
                    crosshair.style.display = 'block';
                    scopeOverlay.classList.add('hidden');
                    gunGroup.visible = true;
                }
            } else {
                currentLerpPos.copy(gunRestPosition);
                gunGroup.position.copy(gunRestPosition);
                gunGroup.rotation.set(0, 0, 0);
                if (camera.fov !== 75) {
                    camera.fov = 75;
                    camera.updateProjectionMatrix();
                }
                scopeOverlay.classList.add('hidden');
            }

            renderer.render(scene, camera);
        }

        updateSensitivityUI(1.000);
        updateMenuCoins();
        setWeaponType('rifle'); 
        animate();

    </script>
</body>
</html>
